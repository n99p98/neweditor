version: '3.9'
services:
  frontend:
    image: node:22
    working_dir: /app/frontend
    volumes: ['.:/app']
    command: sh -lc 'npm install && npm run dev'
    ports: ['3000:3000']
    environment: [NEXT_PUBLIC_API_URL=http://localhost:9000/api]
    depends_on: [backend]
  backend:
    image: php:8.3-fpm
    working_dir: /app/backend
    volumes: ['.:/app']
    command: sh -lc 'php-fpm'
    ports: ['9000:9000']
    depends_on: [mysql,redis]
  nginx:
    image: nginx:1.27
    volumes:
      - .:/app
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
    ports: ['8080:80']
    depends_on: [frontend,backend]
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: printfold
      MYSQL_USER: printfold
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports: ['3306:3306']
  redis:
    image: redis:7
    ports: ['6379:6379']
